<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- MIL-STD-2525D Friendly Tank Symbol -->
  <rect width="64" height="64" fill="#e6f3ff" rx="8"/>
  
  <!-- Blue border for friendly units -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#0066cc" stroke-width="3" rx="6"/>
  
  <!-- Tank body -->
  <rect x="12" y="20" width="40" height="20" fill="#0066cc" rx="3"/>
  
  <!-- Tank turret -->
  <circle cx="32" cy="25" r="12" fill="#0066cc"/>
  
  <!-- Tank gun -->
  <rect x="32" y="13" width="20" height="6" fill="#0066cc" rx="2"/>
  
  <!-- Tracks -->
  <rect x="8" y="40" width="48" height="8" fill="#333" rx="2"/>
  
  <!-- Friendly symbol (triangle) -->
  <polygon points="32,48 28,56 36,56" fill="#0066cc"/>
  
  <!-- Identification frame (friendly) -->
  <rect x="6" y="6" width="52" height="52" fill="none" stroke="#0066cc" stroke-width="2" stroke-dasharray="4 2" rx="4"/>
</svg>