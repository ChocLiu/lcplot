<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- MIL-STD-2525D Hostile Fixed Wing Aircraft Symbol -->
  <rect width="64" height="64" fill="#ffe6e6" rx="8"/>
  
  <!-- Red border for hostile units -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#cc0000" stroke-width="3" rx="6"/>
  
  <!-- Aircraft body -->
  <ellipse cx="32" cy="32" rx="20" ry="8" fill="#cc0000"/>
  
  <!-- Aircraft wings -->
  <polygon points="12,32 52,32 42,20 22,20" fill="#cc0000"/>
  
  <!-- Tail -->
  <polygon points="52,32 62,32 52,24" fill="#cc0000"/>
  
  <!-- Cockpit -->
  <circle cx="40" cy="32" r="4" fill="#fff"/>
  
  <!-- Hostile symbol (diamond) -->
  <polygon points="32,48 28,44 32,40 36,44" fill="#cc0000"/>
  
  <!-- Identification frame (hostile) -->
  <rect x="6" y="6" width="52" height="52" fill="none" stroke="#cc0000" stroke-width="2" stroke-dasharray="4 2" rx="4"/>
</svg>