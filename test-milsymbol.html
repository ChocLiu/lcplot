<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCPLOT Milsymbol Test - Red Icon (Hostile)</title>
    <link href="https://cdn.jsdelivr.net/npm/cesium@1.116.0/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/milsymbol@3.0.4/dist/milsymbol.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        #cesiumContainer {
            width: 100%;
            height: 60vh;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }
        .log {
            padding: 10px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            font-family: monospace;
            font-size: 12px;
            height: 150px;
            overflow-y: auto;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>LCPLOT Milsymbol Integration Test - Red Icon (Hostile Tank)</h1>
    <p>This test creates a hostile (red) tank icon using milsymbol when local icon files are missing. 
       The icon should appear as a red tank symbol on the map.</p>
    
    <div id="cesiumContainer"></div>
    
    <div>
        <button id="initBtn" onclick="initTest()">Initialize Cesium & LCPLOT</button>
        <button id="createBtn" onclick="createPrimitive()" disabled>Create Red Hostile Tank (SIDC: SFGPUCA---A---)</button>
        <button id="checkBtn" onclick="checkIcon()" disabled>Check Icon Source</button>
        <button id="cacheBtn" onclick="checkCache()" disabled>Check Cache Stats</button>
    </div>
    
    <div>
        <h3>Log</h3>
        <div id="log" class="log"></div>
    </div>
    
    <!-- Cesium from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/cesium@1.116.0/Build/Cesium/Cesium.js"></script>
    <!-- LCPLOT UMD bundle (local) -->
    <script src="./dist/lcplot.umd.js"></script>
    
    <script>
        let cesiumViewer = null;
        let lcplotController = null;
        let primitiveId = null;
        
        function log(msg, className = '') {
            const logDiv = document.getElementById('log');
            const line = document.createElement('div');
            line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
            if (className) line.className = className;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function initTest() {
            log('Initializing Cesium via LCPLOT...');
            try {
                // 检查 Cesium 是否完全加载
                if (typeof Cesium === 'undefined') {
                    log('ERROR: Cesium is not defined. Check if CDN loaded successfully.', 'error');
                    return;
                }
                
                log('Cesium version: ' + Cesium.VERSION, 'info');
                
                // Configure Cesium to avoid Ion errors
                Cesium.Ion.defaultAccessToken = '';
                
                // 不预先创建 viewer，让 LCPLOT 的 CesiumController 来创建
                log('Cesium will be initialized by LCPLOT controller', 'info');
                
                // Check if milsymbol is available
                if (typeof window.ms === 'undefined') {
                    log('ERROR: milsymbol not loaded! Make sure the CDN script is included.', 'error');
                    return;
                }
                log('milsymbol detected: ' + window.ms.version);
                
                // Create LCPLOT controller with a baseUrl that doesn't exist (to trigger fallback)
                log('Creating LCPLOT controller...');
                try {
                    lcplotController = new lcplot.CesiumController('cesiumContainer', {}, {
                        // 使用网格底图，避免网络依赖
                        imageryProvider: new Cesium.GridImageryProvider({
                            cells: 8,
                            color: Cesium.Color.fromCssColorString('#444444'),
                            lineWidth: 1
                        }),
                        // 禁用地形
                        terrainProvider: false,
                        symbolLibraryConfig: {
                            baseUrl: '/non-existent-icons', // will cause fallback
                            format: 'svg',
                            size: [64, 64],
                            identityColors: {
                                friend: '#0066FF',
                                hostile: '#FF0000', // 敌方红色
                                neutral: '#00FF00',
                                unknown: '#FFFF00',
                                pending: '#00FFFF',
                                assumed_friend: '#66CCFF',
                                suspect: '#9900FF',
                                exercise_pending: '#FF9900',
                                exercise_unknown: '#996633',
                                joker: '#FF66CC',
                                faker: '#999999'
                            }
                        }
                    });
                    log('LCPLOT controller created successfully.', 'success');
                    document.getElementById('createBtn').disabled = false;
                } catch (err) {
                    log('ERROR creating LCPLOT controller: ' + err.message, 'error');
                    console.error(err);
                }
            } catch (err) {
                log('ERROR initializing Cesium: ' + err.message, 'error');
                console.error(err);
            }
        }
        
        async function createPrimitive() {
            if (!lcplotController) {
                log('Controller not initialized.', 'error');
                return;
            }
            log('Creating primitive with SIDC SFGPUCA---A--- (hostile tank - red icon)...');
            try {
                // 首先测试 milsymbol 是否能生成图标
                if (typeof window.ms !== 'undefined') {
                    try {
                        const testSymbol = new window.ms.Symbol('SFGPUCA---A---', { size: 64 });
                        const svgString = testSymbol.asSVG();
                        log('milsymbol can generate SVG: ' + svgString.substring(0, 100) + '...', 'info');
                    } catch (msErr) {
                        log('WARNING: milsymbol test generation failed: ' + msErr.message, 'error');
                    }
                }
                
                // 获取 viewer（CesiumController 会将其赋值给 window.cesiumViewer）
                const viewer = window.cesiumViewer || cesiumViewer;
                
                primitiveId = await lcplotController.createAdvancedPrimitive({
                    sidc: 'SFGPUCA---A---',
                    position: [116.4, 39.9, 0],
                    properties: {
                        identity: lcplot.IdentityCode.HOSTILE, // 敌方阵营，图标为红色
                        name: 'Red Test Tank'
                    },
                    interaction: {
                        draggable: true,
                        labelDraggable: true,
                        showLabel: true
                    },
                    visualization: {
                        // No billboardUrl provided, will use milsymbol fallback
                        // 增加图标尺寸，确保可见
                        scale: 64.0,
                        // 添加调试信息
                        debug: true
                    }
                });
                log('Primitive created with ID: ' + primitiveId, 'success');
                document.getElementById('checkBtn').disabled = false;
                document.getElementById('cacheBtn').disabled = false;
                
                // 立即检查是否创建成功
                log('Checking Cesium entities after creation...', 'info');
                // 使用之前获取的 viewer 变量
                if (viewer && viewer.entities) {
                    const entityCount = viewer.entities.values.length;
                    log(`Total Cesium entities: ${entityCount}`, 'info');
                    
                    // 查找我们的图元
                    let found = false;
                    const entities = viewer.entities.values;
                    for (let i = 0; i < entities.length; i++) {
                        const entity = entities[i];
                        if (entity.id && entity.id.toString().includes(primitiveId)) {
                            log(`Found our primitive entity: ${entity.id}`, 'success');
                            found = true;
                            
                            // 检查实体属性
                            if (entity.billboard) {
                                log('Entity has billboard', 'info');
                                const billboard = entity.billboard;
                                if (billboard.image) {
                                    const imgSrc = billboard.image.getValue();
                                    log(`Billboard image: ${typeof imgSrc}`, 'info');
                                    if (typeof imgSrc === 'string') {
                                        log(`Image source: ${imgSrc.substring(0, 80)}...`, 'info');
                                    }
                                }
                                if (billboard.scale) {
                                    const scale = billboard.scale.getValue();
                                    log(`Billboard scale: ${scale}`, 'info');
                                }
                            }
                            if (entity.position) {
                                const pos = entity.position.getValue();
                                log(`Entity position: ${JSON.stringify(pos)}`, 'info');
                            }
                            break;
                        }
                    }
                    if (!found) {
                        log('WARNING: Could not find our primitive in Cesium entities', 'error');
                        log('Entity IDs: ' + Array.from(entities).map(e => e.id).join(', '), 'info');
                    }
                } else {
                    log('WARNING: Cannot access Cesium viewer or entities', 'error');
                }
                
                // 为了更容易看到图标，将相机拉近一些
                if (viewer) {
                    viewer.camera.setView({
                        destination: Cesium.Cartesian3.fromDegrees(116.4, 39.9, 5000) // 5km高度，更近
                    });
                    log('Camera zoomed in to 5km for better visibility.', 'info');
                }
            } catch (err) {
                log('ERROR creating primitive: ' + err.message, 'error');
                console.error(err);
            }
        }
        
        function checkIcon() {
            if (!lcplotController) return;
            // 获取 viewer（CesiumController 会将其赋值给 window.cesiumViewer）
            const viewer = window.cesiumViewer || cesiumViewer;
            if (!viewer || !viewer.entities) {
                log('Cesium viewer not available.', 'error');
                return;
            }
            // We can't directly inspect the icon source, but we can check if the primitive is visible
            log('Checking primitive visibility...');
            const entities = viewer.entities.values;
            let found = false;
            for (let i = 0; i < entities.length; i++) {
                if (entities[i].id === primitiveId) {
                    found = true;
                    const billboard = entities[i].billboard;
                    if (billboard && billboard.image) {
                        const imgSrc = billboard.image.getValue();
                        log('Billboard image source: ' + (typeof imgSrc === 'string' ? imgSrc.substring(0, 100) + '...' : 'URL object'));
                        if (imgSrc && imgSrc.startsWith('data:image/svg+xml')) {
                            log('SUCCESS: Icon is generated from SVG data URL (likely from milsymbol).', 'success');
                        } else {
                            log('Icon source is not SVG data URL (maybe default Canvas).', 'error');
                        }
                    }
                    break;
                }
            }
            if (!found) {
                log('Primitive entity not found.', 'error');
            }
        }
        
        function checkCache() {
            if (!lcplotController || typeof lcplotController.getSymbolLibrary !== 'function') {
                log('Cannot check cache: controller or symbol library not available.', 'error');
                return;
            }
            try {
                const symbolLibrary = lcplotController.getSymbolLibrary();
                if (!symbolLibrary || typeof symbolLibrary.getCacheStats !== 'function') {
                    log('Symbol library cache stats method not available.', 'error');
                    return;
                }
                const stats = symbolLibrary.getCacheStats();
                log('Symbol Library Cache Statistics:', 'info');
                log(`  Regular cache: ${stats.cached} entries`, 'info');
                log(`  Loading promises: ${stats.loading}`, 'info');
                log(`  Error cache: ${stats.errors}`, 'info');
                log(`  SVG Data URL cache: ${stats.svgCached || 0} entries`, 'info');
                
                // 检查缓存中是否有我们刚生成的图标
                if (stats.svgCached > 0) {
                    log('SVG cache is working! Generated icons are cached.', 'success');
                }
            } catch (err) {
                log('ERROR checking cache stats: ' + err.message, 'error');
                console.error(err);
            }
        }
    </script>
</body>
</html>
