<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCPLOT 高性能渲染器测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { margin-bottom: 30px; text-align: center; }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 18px; }
        
        .test-section { 
            background: white; 
            border-radius: 8px; 
            padding: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        h2 { color: #444; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #eaeaea; }
        
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        button { 
            padding: 10px 20px; 
            background: #4a6fa5; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover { background: #3a5a85; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        button.success { background: #2e7d32; }
        button.error { background: #c62828; }
        
        .result { 
            margin-top: 15px; 
            padding: 15px; 
            background: #f8f9fa; 
            border-radius: 4px; 
            font-family: 'Consolas', 'Monaco', monospace; 
            font-size: 14px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .status { 
            display: inline-block; 
            padding: 4px 8px; 
            border-radius: 3px; 
            font-size: 12px; 
            font-weight: bold;
            margin-left: 10px;
        }
        .status-pending { background: #ffd54f; color: #333; }
        .status-success { background: #c8e6c9; color: #2e7d32; }
        .status-error { background: #ffcdd2; color: #c62828; }
        
        .canvas-container { 
            margin-top: 15px; 
            text-align: center; 
            border: 1px solid #ddd; 
            padding: 10px;
            border-radius: 4px;
        }
        canvas { 
            max-width: 100%; 
            border: 1px solid #eee;
            background: #fafafa;
        }
        
        .log { 
            margin-top: 20px; 
            padding: 15px; 
            background: #f0f0f0; 
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        footer { 
            margin-top: 30px; 
            text-align: center; 
            color: #888; 
            font-size: 14px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>LCPLOT 高性能 Primitive 渲染器测试</h1>
            <div class="subtitle">纹理图集管理器验证 - 阶段一</div>
        </header>
        
        <div class="test-section">
            <h2>1. 环境检测</h2>
            <div class="button-group">
                <button id="btn-check-webgl" onclick="checkWebGL()">检查 WebGL 支持</button>
                <button id="btn-check-milsymbol" onclick="checkMilsymbol()">检查 milsymbol 库</button>
                <button id="btn-check-canvas" onclick="checkCanvas()">检查 Canvas 2D</button>
            </div>
            <div id="result-environment" class="result"></div>
        </div>
        
        <div class="test-section">
            <h2>2. 纹理图集管理器测试</h2>
            <div class="button-group">
                <button id="btn-init-atlas" onclick="initTextureAtlas()" disabled>初始化纹理图
